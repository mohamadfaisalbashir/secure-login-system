<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Autentikasi - Registrasi</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <div class="page active">
            <div class="form-icon">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <h2>Daftar Akun Baru</h2>
            <p>Buat akun untuk mengakses sistem.</p>
            
            <form id="register-form">
                <div class="input-container">
                    <i class="fa-regular fa-user icon-email"></i>
                    <input type="text" id="reg-username" name="username" placeholder="Nama Pengguna" required>
                </div>
                <div class="input-container password-container">
                    <i class="fa-solid fa-lock icon-password"></i>
                    <input type="password" id="reg-password" name="password" placeholder="Password" required>
                    <i class="fa-solid fa-eye-slash icon-show-password" id="toggle-reg-password"></i>
                </div>
                <button type="submit" class="btn primary full-width">Daftar Sekarang</button>
            </form>
            
            <p class="switch-page">Sudah punya akun? <a href="login.html">Masuk di sini</a></p>
        </div>
    </div>

    <script src="assets/script.js"></script>
</body>
</html>
