<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Autentikasi - Login</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <div class="page active">
            <div class="form-icon">
                <i class="fa-solid fa-right-to-bracket"></i>
            </div>
            <h2>Login</h2>
            <p>Silakan masuk ke akun Anda.</p>
            
            <form id="login-form">
                <div class="input-container">
                    <i class="fa-regular fa-user icon-email"></i>
                    <input type="text" id="login-username" name="username" placeholder="Nama Pengguna" required>
                </div>
                <div class="input-container password-container">
                    <i class="fa-solid fa-lock icon-password"></i>
                    <input type="password" id="login-password" name="password" placeholder="Password" required>
                    <i class="fa-solid fa-eye-slash icon-show-password" id="toggle-login-password"></i>
                </div>
                <button type="submit" class="btn primary full-width">Mulai Masuk</button>
            </form>
                        
            <p class="switch-page">Belum punya akun? <span onclick="window.location.href='register.html'">Daftar di sini</span></p>
        </div>
    </div>

    <script src="assets/script.js"></script>
</body>
</html>
