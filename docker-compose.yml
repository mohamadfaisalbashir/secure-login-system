services:
  db:
    image: mysql:8.0
    container_name: db_faisal
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    command: >
      --innodb-buffer-pool-size=128M
      --max-connections=100
      --innodb-flush-log-at-trx-commit=2
      --sync-binlog=0
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      internal-network:
        ipv4_address: 192.168.1.10
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${DB_USER}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build: ./backend
    container_name: web_faisal
    restart: always
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=8080
      - ENABLE_HTTPS=false
      - BODY_LIMIT=10kb
      - NODE_ENV=production
    volumes:
      - ./frontend:/usr/src/frontend
      - ./backend/cert.pem:/usr/src/app/cert.pem:ro
      - ./backend/key.pem:/usr/src/app/key.pem:ro
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"
    networks:
      internal-network:
        ipv4_address: 192.168.1.12
    healthcheck:
      test: ["CMD-SHELL",
             "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  snort:
    build: ./snort
    container_name: snort_faisal
    restart: always
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - WEB_HOST=web_faisal
      - WEB_PORT=8080
      - WEB_SCHEME=http
      - HTTPS_PORT=443
      - HTTP_PORT=80
      - CERT_FILE=/etc/snort/ssl/cert.pem
      - KEY_FILE=/etc/snort/ssl/key.pem
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./backend/cert.pem:/etc/snort/ssl/cert.pem:ro
      - ./backend/key.pem:/etc/snort/ssl/key.pem:ro
      - snort_logs:/var/log/snort
      - ./snort/acl.conf:/etc/snort/acl.conf:ro
      - ./snort/snort.conf:/etc/snort/snort.conf:ro
      - ./snort/rules:/etc/snort/rules:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      dmz-network:
        ipv4_address: 192.168.2.100
      internal-network:
        ipv4_address: 192.168.1.11
    healthcheck:
      test: ["CMD-SHELL",
             "ss -tlnp | grep -q ':443' && ss -tlnp | grep -q ':80' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  user:
    image: alpine:latest
    container_name: user_faisal
    command: sh -c "apk add --no-cache curl wget iputils jq; cp /tmp/test_ids.sh /test_ids.sh 2>/dev/null; chmod +x /test_ids.sh 2>/dev/null; tail -f /dev/null"
    networks:
      dmz-network:
        ipv4_address: 192.168.2.36
    volumes:
      - ./test_ids.sh:/tmp/test_ids.sh:ro

volumes:
  db_data:
  snort_logs:

networks:
  dmz-network:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.2.0/24
          gateway: 192.168.2.1

  internal-network:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 192.168.1.0/24
          gateway: 192.168.1.1
    
