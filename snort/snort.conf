var HOME_NET any
var EXTERNAL_NET any

# === COMMUNITY SERVER VARIABLES START ===
ipvar HTTP_SERVERS $HOME_NET
ipvar SMTP_SERVERS $HOME_NET
ipvar SQL_SERVERS $HOME_NET
ipvar DNS_SERVERS $HOME_NET
ipvar TELNET_SERVERS $HOME_NET
ipvar SSH_SERVERS $HOME_NET
ipvar FTP_SERVERS $HOME_NET
ipvar SIP_SERVERS $HOME_NET

ipvar AIM_SERVERS any
ipvar DNP3_SERVER $HOME_NET
ipvar DNP3_CLIENT $HOME_NET
ipvar MODBUS_SERVER $HOME_NET
ipvar MODBUS_CLIENT $HOME_NET
ipvar ENIP_SERVER $HOME_NET
ipvar ENIP_CLIENT $HOME_NET
# === COMMUNITY SERVER VARIABLES END ===

# === COMMUNITY RULE VARIABLES START ===
portvar HTTP_PORTS [80,81,311,383,591,593,901,1220,1414,1741,1830,2301,2381,2809,3037,3128,3702,4343,4848,5250,6988,7001,7144,7145,7510,7777,7779,8000,8008,8014,8028,8080,8085,8088,8090,8118,8123,8180,8181,8243,8280,8300,8800,8888,8899,9000,9060,9080,9090,9091,9443,9999,11371,34412,34443,41080,50002,55555]
portvar SHELLCODE_PORTS !80
portvar ORACLE_PORTS 1521
portvar SSH_PORTS 22
portvar FTP_PORTS [21,2100,3535]
portvar SIP_PORTS [5060,5061,5600]
portvar FILE_DATA_PORTS [$HTTP_PORTS,110,143]
portvar GTP_PORTS [2123,2152,3386]
portvar SMTP_PORTS [25,465,587,691]
portvar DNS_PORTS 53
# === COMMUNITY RULE VARIABLES END ===

var RULE_PATH /etc/snort/rules
var SO_RULE_PATH /etc/snort/so_rules
var PREPROC_RULE_PATH /etc/snort/preproc_rules
var WHITE_LIST_PATH /etc/snort/rules
var BLACK_LIST_PATH /etc/snort/rules

config disable_decode_alerts
config disable_tcpopt_experimental_alerts
config disable_tcpopt_obsolete_alerts
config disable_tcpopt_ttcp_alerts
config disable_tcpopt_alerts
config disable_ipopt_alerts
config checksum_mode: none
config policy_mode:inline

preprocessor frag3_global: max_frags 65536
preprocessor frag3_engine: policy linux detect_anomalies overlap_limit 10 min_fragment_length 100 timeout 180

preprocessor stream5_global: track_tcp yes, track_udp yes, track_icmp no, max_tcp 262144, max_udp 131072, max_active_responses 2, min_response_seconds 5
preprocessor stream5_tcp: policy linux, detect_anomalies, overlap_limit 10, small_segments 3 bytes 150, timeout 180
preprocessor stream5_udp: timeout 180

# Output alert ke /var/log/snort/alert
include classification.config
include reference.config

output alert_fast: alert

include $RULE_PATH/local.rules
# include $RULE_PATH/community.rules
# include $RULE_PATH/community-project.rules
