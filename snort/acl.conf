# =============================================================================
# acl.conf — Access Control List (ACL)
# Aplikasi: Sistem Autentikasi (faisal-auth)
# Digunakan oleh: snort container (socat/iptables reverse proxy)
# Format: DIREKTIF  VALUE  [COMMENT]
#
# Direktif yang tersedia:
#   ALLOW_IP    <CIDR>       — Izinkan IP/subnet secara eksplisit
#   BLOCK_IP    <CIDR>       — Blokir IP/subnet secara eksplisit
#   ALLOW_PORT  <port>       — Izinkan port tujuan
#   BLOCK_PORT  <port>       — Blokir port tujuan
#   RATE_LIMIT  <ip> <req/s> — Batas request per detik (diterapkan via iptables hashlimit)
#   WHITELIST   <CIDR>       — Bypass semua filter (trusted admin)
#   BLACKLIST   <CIDR>       — Hard block tanpa pengecualian
#   ALLOW_METHOD <method>    — Izinkan HTTP method
#   BLOCK_METHOD <method>    — Blokir HTTP method
#   BLOCK_UA    <substring>  — Blokir berdasarkan User-Agent substring
#   ALLOW_PATH  <path>       — Izinkan URI path
#   BLOCK_PATH  <path>       — Blokir URI path
# =============================================================================

# =============================================================================
# SECTION 1: WHITELIST — Trusted Admin / Internal Network
# =============================================================================
WHITELIST   127.0.0.1/32        
WHITELIST   172.16.0.0/12         
WHITELIST   10.0.0.0/8             

# =============================================================================
# SECTION 2: BLACKLIST
# =============================================================================
# BLACKLIST 172.19.0.3/32
# BLACKLIST 172.19.0.2/32

# =============================================================================
# SECTION 3: ALLOW_IP — IP/Subnet yang Diizinkan Mengakses Sistem
# =============================================================================
# ALLOW_IP    203.0.113.0/24

# =============================================================================
# SECTION 4: BLOCK_IP — Blokir IP/Subnet Spesifik
# =============================================================================
BLOCK_IP    0.0.0.0/8               # RFC 1122 — invalid source addresses
BLOCK_IP    169.254.0.0/16          # APIPA — link-local, tidak valid dari internet
BLOCK_IP    192.0.2.0/24            # RFC 5737 — TEST-NET-1 documentation
BLOCK_IP    198.51.100.0/24         # RFC 5737 — TEST-NET-2
BLOCK_IP    203.0.113.0/24          # RFC 5737 — TEST-NET-3
BLOCK_IP    240.0.0.0/4             # Reserved — tidak digunakan secara sah
BLOCK_IP    100.64.0.0/10           # RFC 6598 — Shared Address Space (CGN)

# =============================================================================
# SECTION 5: PORT CONTROL
# =============================================================================
# Port yang diizinkan masuk dari internet ke Snort (DMZ)
ALLOW_PORT  443                     # HTTPS — traffic utama
ALLOW_PORT  80                      # HTTP — redirect ke HTTPS via socat

# Port yang DIBLOKIR dari internet (proteksi backend langsung)
BLOCK_PORT  8080                    # Backend Node.js — hanya via internal network
BLOCK_PORT  3306                    # MySQL — tidak boleh exposed ke internet
BLOCK_PORT  22                      # SSH — matikan dari internet (gunakan VPN/bastion)
BLOCK_PORT  23                      # Telnet
BLOCK_PORT  21                      # FTP
BLOCK_PORT  25                      # SMTP
BLOCK_PORT  111                     # RPCbind
BLOCK_PORT  135                     # MSRPC
BLOCK_PORT  137                     # NetBIOS
BLOCK_PORT  139                     # NetBIOS
BLOCK_PORT  445                     # SMB — selalu blokir dari internet
BLOCK_PORT  1433                    # MSSQL
BLOCK_PORT  1521                    # Oracle DB
BLOCK_PORT  5432                    # PostgreSQL
BLOCK_PORT  6379                    # Redis
BLOCK_PORT  27017                   # MongoDB
BLOCK_PORT  9200                    # Elasticsearch
BLOCK_PORT  5601                    # Kibana

# =============================================================================
# SECTION 6: HTTP METHOD CONTROL
# =============================================================================
ALLOW_METHOD    GET                 # Static files, health check
ALLOW_METHOD    POST                # API login/register
ALLOW_METHOD    OPTIONS             # CORS preflight (dimonitor, bukan diblokir)
ALLOW_METHOD    HEAD                # Lightweight probe — aman

BLOCK_METHOD    PUT                 # Tidak ada endpoint PUT di aplikasi ini
BLOCK_METHOD    DELETE              # Tidak ada endpoint DELETE di aplikasi ini
BLOCK_METHOD    PATCH               # Tidak ada endpoint PATCH di aplikasi ini
BLOCK_METHOD    TRACE               # XST (Cross-Site Tracing) vulnerability
BLOCK_METHOD    CONNECT             # HTTP CONNECT tunneling — berbahaya
BLOCK_METHOD    PROPFIND            # WebDAV reconnaissance
BLOCK_METHOD    PROPPATCH           # WebDAV
BLOCK_METHOD    MKCOL               # WebDAV
BLOCK_METHOD    COPY                # WebDAV
BLOCK_METHOD    MOVE                # WebDAV
BLOCK_METHOD    LOCK                # WebDAV
BLOCK_METHOD    UNLOCK              # WebDAV

# =============================================================================
# SECTION 7: USER-AGENT BLOCKING (Scanner & Attack Tools)
# =============================================================================
BLOCK_UA    sqlmap                  # SQL injection scanner
BLOCK_UA    nikto                   # Web vulnerability scanner
BLOCK_UA    nmap                    # Port/service scanner
BLOCK_UA    masscan                 # Fast port scanner
BLOCK_UA    acunetix                # Commercial web scanner
BLOCK_UA    appscan                 # IBM AppScan
BLOCK_UA    w3af                    # Web Application Attack Framework
BLOCK_UA    skipfish                # Google Skipfish
BLOCK_UA    havij                   # SQL injection tool
BLOCK_UA    pangolin                # SQL injection scanner
BLOCK_UA    hydra                   # Brute force tool
BLOCK_UA    medusa                  # Brute force tool
BLOCK_UA    burpsuite               # Penetration testing proxy
BLOCK_UA    ZAP                     # OWASP ZAP scanner
BLOCK_UA    dirbuster               # Directory enumeration
BLOCK_UA    gobuster                # Directory brute force
BLOCK_UA    wfuzz                   # Web fuzzer
BLOCK_UA    python-requests         # Suspicious automated script (sesuaikan jika perlu)
BLOCK_UA    curl/7.1                # Old curl versions often used in scripts
BLOCK_UA    libwww-perl             # Perl HTTP library — sering di automated tools
BLOCK_UA    Java/                   # Raw Java HTTP client — mencurigakan
BLOCK_UA    Go-http-client          # Raw Go HTTP client

# =============================================================================
# SECTION 8: URI PATH CONTROL
# =============================================================================
# Path yang DIIZINKAN (whitelist endpoint)
ALLOW_PATH  /                       # Redirect ke login
ALLOW_PATH  /login.html             # Halaman login
ALLOW_PATH  /register.html          # Halaman register
ALLOW_PATH  /dashboard.html         # Halaman dashboard
ALLOW_PATH  /assets/                # Static assets (CSS, JS)
ALLOW_PATH  /api/login              # API endpoint login
ALLOW_PATH  /api/register           # API endpoint register
ALLOW_PATH  /health                 # Health check (monitoring)

# Path yang DIBLOKIR — akses berbahaya / tidak diperlukan
BLOCK_PATH  /admin                  # Tidak ada admin panel
BLOCK_PATH  /phpmyadmin             # phpMyAdmin — tidak dipakai
BLOCK_PATH  /wp-admin               # WordPress admin — tidak dipakai
BLOCK_PATH  /wp-login.php           # WordPress login
BLOCK_PATH  /.env                   # Environment file — KRITIS
BLOCK_PATH  /.git                   # Git repository exposure
BLOCK_PATH  /.ssh                   # SSH keys exposure
BLOCK_PATH  /config                 # Config directory
BLOCK_PATH  /backup                 # Backup files
BLOCK_PATH  /sql                    # SQL dump files
BLOCK_PATH  /database               # Database files
BLOCK_PATH  /xmlrpc.php             # WordPress XML-RPC
BLOCK_PATH  /server-status          # Apache mod_status
BLOCK_PATH  /server-info            # Apache mod_info
BLOCK_PATH  /cgi-bin                # CGI scripts
BLOCK_PATH  /etc/passwd             # Unix passwd file
BLOCK_PATH  /proc/                  # Proc filesystem
BLOCK_PATH  /api/users              # Enumerate users — tidak ada endpoint ini
BLOCK_PATH  /api/admin              # Admin API — tidak ada
BLOCK_PATH  /api/debug              # Debug endpoint — tidak ada
BLOCK_PATH  /actuator               # Spring Boot actuator (misuse)
BLOCK_PATH  /__pycache__            # Python cache exposure
BLOCK_PATH  /node_modules           # Node modules exposure

# =============================================================================
# SECTION 9: RATE LIMITING (request per detik per IP)
# Format: RATE_LIMIT <CIDR> <max_requests_per_second>
# Implementasi via iptables --hashlimit di setup.sh
# =============================================================================
RATE_LIMIT  0.0.0.0/0  50          # Global: max 50 req/s per IP (normal browsing)
RATE_LIMIT  /api/login  5           # Login endpoint: max 5 req/s per IP
RATE_LIMIT  /api/register  2        # Register endpoint: max 2 req/s per IP

# =============================================================================
# CATATAN IMPLEMENTASI
# =============================================================================
# File ini dibaca oleh setup.sh di snort container untuk:
# 1. Mengkonfigurasi iptables rules (BLACKLIST, BLOCK_IP, BLOCK_PORT)
# 2. Mengkonfigurasi socat/nginx upstream filtering (BLOCK_UA, BLOCK_PATH)
# 3. Mengkonfigurasi hashlimit (RATE_LIMIT)
# 4. Mengkonfigurasi Snort pass rules (WHITELIST)
#
# Urutan prioritas:
# WHITELIST > BLACKLIST > BLOCK_IP > ALLOW_IP > BLOCK_PORT > RATE_LIMIT
# =============================================================================